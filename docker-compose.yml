# =============================================================================
# happy-server — Docker Compose
# =============================================================================
# Quick start:
#   cp .env.example .env   # fill in HANDY_MASTER_SECRET and passwords
#   docker compose up -d
#
# happy-server listens on 127.0.0.1:3005 by default (reverse-proxy friendly).
# To expose directly: change "127.0.0.1:3005:3005" → "0.0.0.0:3005:3005"
# =============================================================================

services:

  # ── happy-server ────────────────────────────────────────────────────────────
  happy-server:
    image: masfrank/happy-server:latest
    container_name: happy-server
    restart: unless-stopped
    ports:
      - "127.0.0.1:3005:3005"
    environment:
      NODE_ENV: production
      TZ: ${TZ:-UTC}
      PORT: 3005
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      HANDY_MASTER_SECRET: ${HANDY_MASTER_SECRET}
      # Optional S3 file storage
      S3_HOST: ${S3_HOST:-}
      S3_PORT: ${S3_PORT:-}
      S3_USE_SSL: ${S3_USE_SSL:-}
      S3_REGION: ${S3_REGION:-}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_PUBLIC_URL: ${S3_PUBLIC_URL:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:3005/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: happy-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-happy-server}
      POSTGRES_USER: ${POSTGRES_USER:-happy}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TZ: ${TZ:-UTC}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-happy} -d ${POSTGRES_DB:-happy-server}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    # Uncomment to expose postgres to host for debugging:
    # ports:
    #   - "127.0.0.1:5432:5432"

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: happy-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    # Uncomment to expose redis to host for debugging:
    # ports:
    #   - "127.0.0.1:6379:6379"

volumes:
  postgres_data:
  redis_data:
